name: SwishOS AI Agent Security & CI Build Check

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-typecheck:
    name: Typecheck & Production Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Typecheck
        run: npx tsc --noEmit

      - name: Next.js Production Build
        run: npm run build

  agentic-security-scan:
    name: Red-Team Assertion Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install agentic-redteam Harness
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/Muneeb7860/agentic-redteam.git

      - name: Verify Red-Team Installation
        run: agentic-redteam --help
