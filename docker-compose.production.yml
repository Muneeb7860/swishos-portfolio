version: '3.8'

services:
  swishos-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swishos-app-production
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL:-}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN:-}
      - AUDIT_PROOF_SECRET=${AUDIT_PROOF_SECRET:-swishos-audit-proof-signature-key-v4}
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.50'
          memory: 1024M
        reservations:
          cpus: '0.50'
          memory: 256M

  agent-executor-enclave:
    image: swishos/agent-executor:latest
    container_name: agent-executor-gvisor-enclave
    runtime: runsc  # gVisor User-Space Virtual Kernel Isolation
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m  # Memory-only /tmp with zero binary execution
    security_opt:
      - no-new-privileges:true
      - seccomp=unconfined  # Handled safely inside gVisor virtual kernel
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    pids_limit: 20
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    restart: on-failure
